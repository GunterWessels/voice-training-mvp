# LithoVue Elite Single-Use Digital Flexible Ureteroscope — RAG Knowledge Base
# Product: Boston Scientific LithoVue™ Elite Single-Use Digital Flexible Ureteroscope System
# Source: bostonscientific.com/en-US/medical-specialties/urology/products/lithovue-elite.html
# FDA 510(k) cleared: February 3, 2023
# Last updated: 2026-04-01

