# Development — hot reload for both backend and frontend
# Usage: docker compose -f docker-compose.dev.yml up
# Frontend changes appear immediately; backend reloads on file save.
# No local Postgres — connects to Supabase via DATABASE_URL in backend/.env

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0 --port 8000
      --reload
      --ws-ping-interval 20 --ws-ping-timeout 10
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      target: deps          # stop after npm ci — skip the production build
    working_dir: /app
    command: npm run dev
    ports:
      - "3002:3000"
    env_file: ./frontend-next/.env.local
    environment:
      - WATCHPACK_POLLING=true   # required for inotify inside Docker on macOS
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend-next:/app
      - /app/node_modules        # preserve container's installed modules
    depends_on:
      backend:
        condition: service_healthy
